<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3者日程調整アプリ</title>
<style>
  :root {
    --ink:#1a1a2e; --ink-light:#2d2d4a;
    --paper:#f5f0e8; --paper-dark:#ede7d9;
    --seal:#c0392b; --seal-light:#e74c3c;
    --gold:#b8860b; --muted:#7a7a8c;
    --border:#c8c0b0; --shadow:rgba(26,26,46,0.12);
    --green:#2d5a3d; --blue:#1a3a5c; --brown:#5c2d1a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,rgba(184,134,11,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(192,57,43,.05) 0%,transparent 60%);}
  body::before{content:'';display:block;height:4px;background:linear-gradient(90deg,var(--seal),var(--gold),var(--seal));}
  header{text-align:center;padding:40px 24px 24px;border-bottom:1px solid var(--border);}
  header::after{content:'◆';display:block;color:var(--gold);font-size:12px;margin-top:14px;letter-spacing:8px;}
  h1{font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:clamp(18px,4vw,28px);font-weight:700;letter-spacing:.1em;}
  h1 span{display:block;font-size:11px;font-weight:300;color:var(--muted);letter-spacing:.3em;margin-bottom:6px;}
  .container{max-width:680px;margin:0 auto;padding:32px 20px 80px;}
  .role-banner{display:flex;align-items:center;gap:14px;padding:16px 20px;border-radius:2px;margin-bottom:28px;border:1px solid var(--border);}
  .role-banner .rbadge{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;color:white;}
  .role-banner h2{font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:17px;font-weight:600;}
  .role-banner p{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.6;}
  .ra .rbadge{background:var(--blue);} .ra{background:#f0f4fa;border-color:#b0c4de;}
  .rb .rbadge{background:var(--green);} .rb{background:#f0f7f2;border-color:#a0c8a8;}
  .rc .rbadge{background:var(--brown);} .rc{background:#faf4f0;border-color:#d4b0a0;}
  .card{background:white;border:1px solid var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;box-shadow:0 2px 10px var(--shadow);}
  .card-header{padding:13px 20px;border-bottom:1px solid var(--border);background:var(--paper-dark);font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:14px;font-weight:600;letter-spacing:.08em;}
  .card-body{padding:18px 20px;}
  label{display:block;font-size:11px;font-weight:500;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  input[type="text"]{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:2px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--paper);outline:none;transition:border-color .2s,box-shadow .2s;}
  input[type="text"]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.1);}
  .slot-form{background:var(--paper-dark);border:1px solid var(--border);border-radius:2px;padding:14px 16px;margin-top:10px;}
  .slot-form-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .slot-field{display:flex;align-items:center;gap:4px;}
  .slot-sep-unit{font-size:13px;color:var(--ink);font-weight:500;white-space:nowrap;}
  .slot-tilde{font-size:16px;color:var(--muted);padding:0 2px;}
  .slot-num{width:58px;padding:8px 6px;border:1px solid var(--border);border-radius:2px;font-size:18px;font-weight:600;text-align:center;color:var(--ink);background:white;outline:none;transition:border-color .2s;-moz-appearance:textfield;}
  .slot-num::-webkit-inner-spin-button,.slot-num::-webkit-outer-spin-button{-webkit-appearance:none;}
  .slot-num:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.1);}
  .slot-preview{margin-top:10px;font-size:13px;color:var(--muted);font-weight:500;min-height:20px;}
  .slot-preview.filled{color:var(--gold);}
  .date-list{margin:10px 0 6px;}
  .date-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--paper-dark);border:1px solid var(--border);border-radius:2px;margin-bottom:6px;font-size:13px;animation:slideIn .2s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
  .date-item .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
  .date-item .date-text{flex:1;}
  .date-item .remove-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px;transition:color .15s;}
  .date-item .remove-btn:hover{color:var(--seal);}
  .check-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);border-radius:2px;margin-bottom:8px;cursor:pointer;background:white;transition:all .18s;}
  .check-item:hover{border-color:var(--gold);box-shadow:0 1px 6px var(--shadow);}
  .check-item input[type="checkbox"]{display:none;}
  .check-box{width:18px;height:18px;border:2px solid var(--border);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .18s;}
  .check-item.checked .check-box{background:var(--ink);border-color:var(--ink);color:white;}
  .check-item.checked{border-color:var(--ink);background:rgba(26,26,46,.03);}
  .radio-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--border);border-radius:2px;margin-bottom:8px;cursor:pointer;background:white;transition:all .2s;}
  .radio-item:hover{border-color:var(--gold);box-shadow:0 2px 8px var(--shadow);}
  .radio-circle{width:18px;height:18px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;transition:all .18s;position:relative;}
  .radio-item.selected{border-color:var(--ink);background:var(--ink);color:var(--paper);}
  .radio-item.selected .radio-circle{border-color:var(--gold);background:var(--gold);}
  .date-main{font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:15px;font-weight:600;}
  .result-box{border:2px solid var(--gold);border-radius:2px;padding:20px 24px;background:white;margin-bottom:20px;text-align:center;}
  .result-box .rlabel{font-size:11px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  .result-box .date-big{font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:22px;font-weight:700;}
  .email-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  @media(max-width:500px){.email-meta{grid-template-columns:1fr;}}
  textarea{width:100%;padding:14px;border:1px solid var(--border);border-radius:2px;font-family:inherit;font-size:13px;line-height:1.9;color:var(--ink);background:var(--paper);resize:vertical;min-height:280px;outline:none;transition:border-color .2s;}
  textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.08);}
  .btn-primary{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;margin-top:24px;background:var(--ink);color:var(--paper);border:none;border-radius:2px;font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:14px;font-weight:600;letter-spacing:.15em;cursor:pointer;transition:all .22s;}
  .btn-primary:hover{background:var(--ink-light);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{background:var(--muted);cursor:not-allowed;}
  .btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;background:none;border:1px solid var(--border);border-radius:2px;font-family:inherit;font-size:12px;color:var(--ink);cursor:pointer;transition:all .18s;}
  .btn-secondary:hover{border-color:var(--ink);background:var(--paper-dark);}
  .btn-copy{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:var(--seal);color:white;border:none;border-radius:2px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .18s;}
  .btn-copy:hover{background:var(--seal-light);}
  .btn-copy.copied{background:var(--green);}
  .btn-icon{width:32px;height:32px;border:1px solid var(--border);border-radius:2px;background:none;cursor:pointer;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
  .btn-icon:hover{border-color:var(--gold);color:var(--gold);}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  .error{color:var(--seal);font-size:12px;margin-top:8px;display:none;}
  .error.show{display:block;}
  /* ステータスバー */
  .status-bar{display:flex;align-items:center;gap:0;margin-bottom:28px;border:1px solid var(--border);border-radius:2px;overflow:hidden;}
  .status-step{flex:1;padding:10px 6px;text-align:center;font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--muted);background:var(--paper-dark);border-right:1px solid var(--border);transition:all .3s;}
  .status-step:last-child{border-right:none;}
  .status-step .snum{display:block;font-size:16px;font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-weight:700;margin-bottom:2px;}
  .status-step.active{background:var(--ink);color:var(--paper);}
  .status-step.done{background:var(--paper);color:var(--gold);}
  /* 待機メッセージ */
  .waiting-box{text-align:center;padding:40px 20px;border:1px dashed var(--border);border-radius:2px;background:white;}
  .waiting-box .wicon{font-size:32px;margin-bottom:12px;}
  .waiting-box p{color:var(--muted);font-size:13px;line-height:1.9;}
  .waiting-box .wstatus{font-size:15px;font-weight:600;color:var(--gold);margin-bottom:8px;font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;}
  /* パスワード */
  #pw-screen{position:fixed;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;}
  #pw-screen::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--seal),var(--gold),var(--seal));}
  .pw-box{width:100%;max-width:360px;background:white;border:1px solid var(--border);border-radius:2px;box-shadow:0 4px 24px var(--shadow);overflow:hidden;}
  .pw-header{padding:28px 28px 20px;border-bottom:1px solid var(--border);background:var(--paper-dark);text-align:center;}
  .pw-header .lock-icon{font-size:28px;margin-bottom:10px;}
  .pw-header h2{font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:16px;font-weight:600;letter-spacing:.1em;}
  .pw-header p{font-size:11px;color:var(--muted);margin-top:4px;}
  .pw-body{padding:24px 28px;}
  .pw-input-row{display:flex;gap:8px;align-items:center;}
  .pw-input-row input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:2px;font-size:15px;letter-spacing:.2em;background:var(--paper);outline:none;transition:border-color .2s;}
  .pw-input-row input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,11,.1);}
  .pw-toggle{width:34px;height:34px;flex-shrink:0;border:1px solid var(--border);border-radius:2px;background:none;cursor:pointer;color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;}
  .pw-error{font-size:12px;color:var(--seal);margin-top:8px;min-height:16px;display:none;}
  .pw-error.show{display:block;}
  .pw-btn{width:100%;padding:13px;margin-top:16px;background:var(--ink);color:var(--paper);border:none;border-radius:2px;font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;font-size:14px;font-weight:600;letter-spacing:.15em;cursor:pointer;}
  .pw-footer{padding:12px 28px;border-top:1px solid var(--border);background:var(--paper-dark);text-align:center;font-size:11px;color:var(--muted);}
  /* ロール選択 */
  .role-select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px;}
  @media(max-width:480px){.role-select-grid{grid-template-columns:1fr;}}
  .role-card{padding:20px 12px;border:1px solid var(--border);border-radius:2px;text-align:center;cursor:pointer;background:white;transition:all .2s;}
  .role-card:hover{box-shadow:0 2px 12px var(--shadow);}
  .role-card.ra-card:hover,.role-card.ra-card.sel{border-color:#b0c4de;background:#f0f4fa;}
  .role-card.rb-card:hover,.role-card.rb-card.sel{border-color:#a0c8a8;background:#f0f7f2;}
  .role-card.rc-card:hover,.role-card.rc-card.sel{border-color:#d4b0a0;background:#faf4f0;}
  .role-card .rc-badge{width:40px;height:40px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;font-family:'Yu Mincho','Hiragino Mincho ProN','MS PMincho',serif;}
  .role-card h3{font-size:13px;font-weight:600;margin-bottom:4px;}
  .role-card p{font-size:11px;color:var(--muted);line-height:1.5;}
  .screen{animation:fadeIn .35s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  /* ローディング */
  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
  .loading::before{content:'⏳';display:block;font-size:32px;margin-bottom:12px;}
</style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-header">
      <div class="lock-icon">🔒</div>
      <h2>アクセス制限</h2>
      <p>このページは関係者限定です</p>
    </div>
    <div class="pw-body">
      <label>パスワード</label>
      <div class="pw-input-row">
        <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key===&#39;Enter&#39;)checkPw()" autocomplete="off">
        <button class="pw-toggle" onclick="togglePw()" id="pw-toggle-btn">👁</button>
      </div>
      <p class="pw-error" id="pw-error">パスワードが正しくありません</p>
      <button class="pw-btn" onclick="checkPw()">入室する</button>
    </div>
    <div class="pw-footer">稚内医師・北大医師・キヤノンMJ 関係者専用</div>
  </div>
</div>

<header>
  <h1>
    <span>3-Party Schedule Coordinator</span>
    稚内医師 → キヤノンMJ → 北大医師　日程調整
  </h1>
</header>

<div class="container" id="main-container">
  <div class="loading">接続中...</div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyApqwCDUb1tS2S4YN7kWGWMxUNKZxkOna0",
  authDomain: "schedule-coordination-web-app.firebaseapp.com",
  databaseURL: "https://schedule-coordination-web-app-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "schedule-coordination-web-app",
  storageBucket: "schedule-coordination-web-app.firebasestorage.app",
  messagingSenderId: "1016393407222",
  appId: "1:1016393407222:web:adf5e5dccd0ac7405e2ad7",
  measurementId: "G-GK86XR3ZND"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── 定数 ──────────────────────────────────────────────────────────────
const CORRECT_PASSWORD = 'Canon2026';
const SESSION_KEY = 'schedule_session_2026';
let currentRole = null;
let doctorADates = [];
let selectedFinal = '';
let unsubscribe = null;

// ── パスワード ─────────────────────────────────────────────────────────
window.checkPw = function() {
  const v = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');
  if (v === CORRECT_PASSWORD) {
    const s = document.getElementById('pw-screen');
    s.style.transition = 'opacity .4s';
    s.style.opacity = '0';
    setTimeout(() => { s.remove(); showRoleSelect(); }, 400);
  } else {
    err.classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => err.classList.remove('show'), 3000);
  }
};
window.togglePw = function() {
  const inp = document.getElementById('pw-input');
  const btn = document.getElementById('pw-toggle-btn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
};
window.addEventListener('load', () => document.getElementById('pw-input').focus());

// ── ユーティリティ ─────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function render(html) {
  const c = document.getElementById('main-container');
  c.innerHTML = html;
  c.className = 'container screen';
}
function statusBar(active) {
  const steps = ['稚内医師','キヤノンMJ','北大医師','キヤノンMJメール'];
  return '<div class="status-bar">' + steps.map((s,i) =>
    '<div class="status-step ' + (i < active ? 'done' : i === active ? 'active' : '') + '">'
    + '<span class="snum">' + (i+1) + '</span>' + s + '</div>'
  ).join('') + '</div>';
}

// ── ロール選択画面 ─────────────────────────────────────────────────────
function showRoleSelect() {
  render(`
    <div class="card">
      <div class="card-header">あなたの役割を選択してください</div>
      <div class="card-body">
        <div class="role-select-grid">
          <div class="role-card ra-card" onclick="selectRole('doctorA')">
            <div class="rc-badge" style="background:var(--blue);">A</div>
            <h3>稚内医師</h3>
            <p>空き日程を入力する</p>
          </div>
          <div class="role-card rc-card" onclick="selectRole('canon')">
            <div class="rc-badge" style="background:var(--brown);">企</div>
            <h3>キヤノンMJ</h3>
            <p>候補を絞り込む・メール生成</p>
          </div>
          <div class="role-card rb-card" onclick="selectRole('doctorB')">
            <div class="rc-badge" style="background:var(--green);">B</div>
            <h3>北大医師</h3>
            <p>最終日程を確定する</p>
          </div>
        </div>
      </div>
    </div>
  `);
}
window.selectRole = function(role) {
  currentRole = role;
  if (role === 'doctorA') showDoctorA();
  else if (role === 'canon') watchAndShowCanon();
  else if (role === 'doctorB') watchAndShowDoctorB();
};

// ════════════════════════════════════════════════════════════════
// 稚内医師：空き日程入力
// ════════════════════════════════════════════════════════════════
function showDoctorA() {
  doctorADates = [];
  render(`
    ${statusBar(0)}
    <div class="role-banner ra">
      <div class="rbadge">A</div>
      <div>
        <h2>稚内医師　— 空き日程を入力</h2>
        <p>空き時間を入力して「キヤノンMJへ送る」を押してください</p>
      </div>
    </div>
    <div class="card">
      <div class="card-header">空き時間スロット入力</div>
      <div class="card-body">
        <div class="date-list" id="list-a"></div>
        <div class="slot-form">
          <div class="slot-form-row">
            <div class="slot-field">
              <input type="number" id="sf-month" min="1" max="12" class="slot-num" oninput="updatePreview()" />
              <span class="slot-sep-unit">月</span>
            </div>
            <div class="slot-field">
              <input type="number" id="sf-day" min="1" max="31" class="slot-num" oninput="updatePreview()" />
              <span class="slot-sep-unit">日</span>
            </div>
            <div class="slot-field">
              <input type="number" id="sf-start" min="0" max="23" class="slot-num" oninput="updatePreview()" />
              <span class="slot-sep-unit">時</span>
            </div>
            <span class="slot-tilde">〜</span>
            <div class="slot-field">
              <input type="number" id="sf-end" min="0" max="23" class="slot-num" oninput="updatePreview()" />
              <span class="slot-sep-unit">時</span>
            </div>
            <button class="btn-icon" onclick="addDateA()" title="追加">＋</button>
          </div>
          <p class="slot-preview" id="slot-preview">開始と終了時間は1時間で入力してください</p>
        </div>
        <p class="error" id="err-a">少なくとも1つのスロットを入力してください。</p>
        <p class="error" id="err-slot">月・日・開始・終了をすべて入力してください。</p>
      </div>
    </div>
    <button class="btn-primary" onclick="submitDoctorA()">キヤノンMJへ送る →</button>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn-secondary" onclick="showRoleSelect()">← 役割選択に戻る</button>
    </div>
  `);
}

window.updatePreview = function() {
  const m = document.getElementById('sf-month').value;
  const d = document.getElementById('sf-day').value;
  const s = document.getElementById('sf-start').value;
  const e = document.getElementById('sf-end').value;
  const el = document.getElementById('slot-preview');
  if (m && d && s !== '' && e !== '') {
    el.textContent = m+'月'+d+'日　'+s+'時〜'+e+'時';
    el.classList.add('filled');
  } else {
    el.textContent = '開始と終了時間は1時間で入力してください';
    el.classList.remove('filled');
  }
};

window.addDateA = function() {
  const m = document.getElementById('sf-month').value;
  const d = document.getElementById('sf-day').value;
  const s = document.getElementById('sf-start').value;
  const e = document.getElementById('sf-end').value;
  const errSlot = document.getElementById('err-slot');
  if (!m || !d || s === '' || e === '') {
    errSlot.classList.add('show'); errSlot.style.display='block'; return;
  }
  errSlot.classList.remove('show'); errSlot.style.display='none';
  doctorADates.push(m+'月'+d+'日　'+s+'時〜'+e+'時');
  renderListA();
  ['sf-month','sf-day','sf-start','sf-end'].forEach(id => document.getElementById(id).value='');
  const el = document.getElementById('slot-preview');
  el.textContent='開始と終了時間は1時間で入力してください';
  el.classList.remove('filled');
  document.getElementById('sf-month').focus();
};

window.removeDateA = function(i) { doctorADates.splice(i,1); renderListA(); };

function renderListA() {
  const ul = document.getElementById('list-a');
  if (!ul) return;
  ul.innerHTML = '';
  doctorADates.forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'date-item';
    el.innerHTML = '<span class="dot"></span><span class="date-text">'+esc(d)+'</span><button class="remove-btn" onclick="removeDateA('+i+')">✕</button>';
    ul.appendChild(el);
  });
}

window.submitDoctorA = async function() {
  const m = document.getElementById('sf-month').value;
  const d = document.getElementById('sf-day').value;
  const s = document.getElementById('sf-start').value;
  const e = document.getElementById('sf-end').value;
  if (m && d && s !== '' && e !== '') doctorADates.push(m+'月'+d+'日　'+s+'時〜'+e+'時');
  const err = document.getElementById('err-a');
  if (doctorADates.length === 0) { err.classList.add('show'); return; }
  err.classList.remove('show');
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = '送信中...';
  try {
    await set(ref(db, 'session'), {
      step: 'canon',
      doctorADates: doctorADates,
      canonDates: null,
      finalDate: null,
      updatedAt: Date.now()
    });
    showDoctorADone();
  } catch(err) {
    alert('送信に失敗しました。接続を確認してください。');
    btn.disabled = false; btn.textContent = 'キヤノンMJへ送る →';
  }
};

function showDoctorADone() {
  render(`
    ${statusBar(1)}
    <div class="role-banner ra">
      <div class="rbadge">A</div>
      <div><h2>稚内医師　— 送信完了</h2><p>キヤノンMJ担当者が候補を選ぶまでお待ちください</p></div>
    </div>
    <div class="waiting-box">
      <div class="wicon">✅</div>
      <div class="wstatus">空き日程を送信しました</div>
      <p>キヤノンMJ担当者が候補日程を選択中です。<br>この画面はそのままにしておいてください。</p>
    </div>
  `);
}

// ════════════════════════════════════════════════════════════════
// キヤノンMJ：候補選択 or メール生成
// ════════════════════════════════════════════════════════════════
function watchAndShowCanon() {
  render(`<div class="loading">データを取得中...</div>`);
  if (unsubscribe) unsubscribe();
  const sessionRef = ref(db, 'session');
  unsubscribe = onValue(sessionRef, (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      showCanonWaiting();
      return;
    }
    if (data.step === 'canon' && data.doctorADates) {
      showCanonSelect(data.doctorADates);
    } else if (data.step === 'doctorb' && data.canonDates) {
      showCanonWaitingB();
    } else if (data.step === 'done' && data.finalDate) {
      showMailGen(data.finalDate);
    } else {
      showCanonWaiting();
    }
  });
}

function showCanonWaiting() {
  render(`
    ${statusBar(1)}
    <div class="role-banner rc">
      <div class="rbadge">企</div>
      <div><h2>キヤノンMJ　— 待機中</h2><p>稚内医師が空き日程を入力するまでお待ちください</p></div>
    </div>
    <div class="waiting-box">
      <div class="wicon">⏳</div>
      <div class="wstatus">稚内医師の入力待ち</div>
      <p>稚内医師が空き日程を送信すると<br>自動的にこの画面が切り替わります。</p>
    </div>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn-secondary" onclick="showRoleSelect()">← 役割選択に戻る</button>
    </div>
  `);
}

function showCanonWaitingB() {
  render(`
    ${statusBar(2)}
    <div class="role-banner rc">
      <div class="rbadge">企</div>
      <div><h2>キヤノンMJ　— 送信完了</h2><p>北大医師が日程を確定するまでお待ちください</p></div>
    </div>
    <div class="waiting-box">
      <div class="wicon">✅</div>
      <div class="wstatus">候補日程を送信しました</div>
      <p>北大医師が最終日程を選択中です。<br>確定するとこの画面が自動的に切り替わります。</p>
    </div>
  `);
}

function showCanonSelect(dates) {
  const items = dates.map((d,i) =>
    '<label class="check-item" id="ci-'+i+'" onclick="toggleCheck(event,'+i+')">'
    +'<input type="checkbox" value="'+esc(d)+'"><span class="check-box">✓</span>'
    +'<span style="font-size:14px;">'+esc(d)+'</span></label>'
  ).join('');
  render(`
    ${statusBar(1)}
    <div class="role-banner rc">
      <div class="rbadge">企</div>
      <div><h2>キヤノンMJ　— 候補日程を選択</h2><p>ご都合のよい日程にチェックを入れて北大医師へ送ってください</p></div>
    </div>
    <div class="card">
      <div class="card-header">稚内医師の空き日程</div>
      <div class="card-body">
        <div id="canon-list">${items}</div>
        <p class="error" id="err-canon">少なくとも1つ選択してください。</p>
      </div>
    </div>
    <button class="btn-primary" onclick="submitCanon()">北大医師へ送る →</button>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn-secondary" onclick="showRoleSelect()">← 役割選択に戻る</button>
    </div>
  `);
}

window.toggleCheck = function(e, i) {
  const item = document.getElementById('ci-'+i);
  const cb = item.querySelector('input');
  cb.checked = !cb.checked;
  item.classList.toggle('checked', cb.checked);
};

window.submitCanon = async function() {
  const picked = Array.from(document.querySelectorAll('#canon-list input:checked')).map(el => el.value);
  const err = document.getElementById('err-canon');
  if (picked.length === 0) { err.classList.add('show'); return; }
  err.classList.remove('show');
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = '送信中...';
  try {
    await update(ref(db, 'session'), { step:'doctorb', canonDates: picked, updatedAt: Date.now() });
  } catch(e) {
    alert('送信に失敗しました。'); btn.disabled=false; btn.textContent='北大医師へ送る →';
  }
};

// ════════════════════════════════════════════════════════════════
// 北大医師：最終日程確定
// ════════════════════════════════════════════════════════════════
function watchAndShowDoctorB() {
  render(`<div class="loading">データを取得中...</div>`);
  if (unsubscribe) unsubscribe();
  const sessionRef = ref(db, 'session');
  unsubscribe = onValue(sessionRef, (snapshot) => {
    const data = snapshot.val();
    if (!data || data.step === 'canon') {
      showDoctorBWaiting();
    } else if (data.step === 'doctorb' && data.canonDates) {
      showDoctorBSelect(data.canonDates);
    } else if (data.step === 'done') {
      showDoctorBDone();
    }
  });
}

function showDoctorBWaiting() {
  render(`
    ${statusBar(2)}
    <div class="role-banner rb">
      <div class="rbadge">B</div>
      <div><h2>北大医師　— 待機中</h2><p>キヤノンMJが候補を選ぶまでお待ちください</p></div>
    </div>
    <div class="waiting-box">
      <div class="wicon">⏳</div>
      <div class="wstatus">キヤノンMJの選択待ち</div>
      <p>キヤノンMJ担当者が候補日程を選択すると<br>自動的にこの画面が切り替わります。</p>
    </div>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn-secondary" onclick="showRoleSelect()">← 役割選択に戻る</button>
    </div>
  `);
}

function showDoctorBSelect(dates) {
  selectedFinal = '';
  const items = dates.map((d,i) =>
    '<div class="radio-item" data-val="'+esc(d)+'" onclick="selectRadio(this)">'
    +'<div class="radio-circle"></div><div class="date-main">'+esc(d)+'</div></div>'
  ).join('');
  render(`
    ${statusBar(2)}
    <div class="role-banner rb">
      <div class="rbadge">B</div>
      <div><h2>北大医師　— 最終日程を選択</h2><p>ご都合のよい日程を1つ選んで確定してください</p></div>
    </div>
    <div class="card">
      <div class="card-header">候補日程</div>
      <div class="card-body">
        <div id="b-list">${items}</div>
        <p class="error" id="err-b">日程を選択してください。</p>
      </div>
    </div>
    <button class="btn-primary" onclick="submitDoctorB()">日程を確定する →</button>
    <div style="margin-top:12px;text-align:center;">
      <button class="btn-secondary" onclick="showRoleSelect()">← 役割選択に戻る</button>
    </div>
  `);
}

window.selectRadio = function(el) {
  document.querySelectorAll('#b-list .radio-item').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  selectedFinal = el.dataset.val;
};

window.submitDoctorB = async function() {
  const err = document.getElementById('err-b');
  if (!selectedFinal) { err.classList.add('show'); return; }
  err.classList.remove('show');
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = '確定中...';
  try {
    await update(ref(db, 'session'), { step:'done', finalDate: selectedFinal, updatedAt: Date.now() });
  } catch(e) {
    alert('送信に失敗しました。'); btn.disabled=false; btn.textContent='日程を確定する →';
  }
};

function showDoctorBDone() {
  render(`
    ${statusBar(3)}
    <div class="role-banner rb">
      <div class="rbadge">B</div>
      <div><h2>北大医師　— 確定完了</h2><p>日程が確定しました。ありがとうございました。</p></div>
    </div>
    <div class="waiting-box">
      <div class="wicon">✅</div>
      <div class="wstatus">日程を確定しました</div>
      <p>キヤノンMJ担当者がメール文を生成しています。<br>ご参加ありがとうございました。</p>
    </div>
  `);
}

// ════════════════════════════════════════════════════════════════
// キヤノンMJ：メール生成
// ════════════════════════════════════════════════════════════════
function showMailGen(finalDate) {
  const subject = '【面談日程のご確認】北大（北井先生）・市立稚内（村中先生）との面談について';
  const body = [
    '北井先生、村中先生へ',
    '',
    '平素より大変お世話になっております。',
    'キヤノンマーケティングジャパン株式会社の阿部でございます。',
    '',
    'この度は面談日程のご調整にご協力いただき、誠にありがとうございます。',
    '',
    '北井先生、村中先生のご都合を確認した結果、',
    '以下の日程で面談を開催させていただきたく存じます。',
    '',
    '──────────────────────────',
    '　■ 確定日時：' + finalDate,
    '　■ 場　　所：（場所を記入してください）',
    '　■ 形　　式：対面 / オンライン（どちらかを選択してください）',
    '──────────────────────────',
    '',
    'ご多忙の中、お時間をいただきありがとうございます。',
    '当日は何卒よろしくお願い申し上げます。',
    '',
    'ご不明な点やご変更がございましたら、',
    'お気軽にご連絡ください。',
    '',
    'キヤノンマーケティングジャパン株式会社',
    '阿部',
    '──────────────────────────'
  ].join('\n');
  render(`
    ${statusBar(3)}
    <div class="role-banner rc">
      <div class="rbadge">企</div>
      <div><h2>キヤノンMJ　— メール生成</h2><p>確定日程が届きました。メール文をご確認ください。</p></div>
    </div>
    <div class="result-box">
      <div class="rlabel">確定日時</div>
      <div class="date-big">${esc(finalDate)}</div>
    </div>
    <div class="card">
      <div class="card-header">📧 メール文</div>
      <div class="card-body">
        <div class="email-meta">
          <div>
            <label>宛先</label>
            <input type="text" id="email-to" value="北大（北井先生）、市立稚内（村中先生）"/>
          </div>
          <div>
            <label>件名</label>
            <input type="text" id="email-subject" value="${esc(subject)}"/>
          </div>
        </div>
        <label>本文</label>
        <textarea id="email-body">${esc(body)}</textarea>
        <div class="btn-row">
          <button class="btn-copy" id="copy-mail" onclick="copyMail()">📋 本文をコピー</button>
          <button class="btn-secondary" onclick="resetSession()">↺ 最初からやり直す</button>
        </div>
      </div>
    </div>
  `);
}

window.copyMail = function() {
  navigator.clipboard.writeText(document.getElementById('email-body').value).then(() => {
    const btn = document.getElementById('copy-mail');
    btn.textContent = '✓ コピーしました';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 本文をコピー'; btn.classList.remove('copied'); }, 2500);
  });
};

window.resetSession = async function() {
  if (!confirm('セッションをリセットして最初からやり直しますか？')) return;
  await set(ref(db, 'session'), null);
  showRoleSelect();
};

window.showRoleSelect = showRoleSelect;

</script>
